<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title></title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="all">
      <div id="login_title">
        <h1><span>인천대학교
          <font color="#16529B">대학 수강신청</font></span> Course registration</h1>
      </div>
      <div id="login_box">
        <h1>Login</h1>
        <div id="button-box">
          <form id="begin-box">
            <table>
              <tr>
                <td>
                  <label for="id_number">아이디(학번)</label>
                  <input id="id_number" type="text" name="" value="">
                </td>
                <td rowspan="2">
                  <input type="button" name="" value="로그인">
                </td>
              </tr>
              <tr>
                <td>
                  <label for="pwd">포털비밀번호</label>
                  <input id="pwd" type="password" name="" value="">
                </td>
              </tr>
            </table>
            <p>*아이디(학번)/비밀번호는 포털시스템과 동일합니다.</p>
            <p>아이디/비밀번호 찾기</p>
          </form>
          <form id="end-box">
            <table>
              <tr>
                <td>
                  <input type="button" name="" value="수강신청안내">
                </td>
                <td>
                  <input type="button" name="" value="대학원 수강신청">
                </td>
              </tr>
              <tr>
                <td>
                  <input type="button" name="" value="환경설정 및 유의사항">
                </td>
                <td>
                  <input type="button" name="" value="교수-자녀간 수강신청&#10;[사전신고 안내]">
                </td>
              </tr>
            </table>
          </form>
          <br>
          <br>
          <br>
          <br>
          <p>
            <font color="blue">*다중로그인 및 매크로 방지 시행 안내(2020-1학기 부터
              적용)</font><br><br>
            <font color="blue">*모바일 수강신청 앱
              변경 및 매뉴얼(2020-1학기 변경)</font><br><br>
            <font color="red">※ 코로나19 확산 대응에 따라 장바구니 신청 시 교과목의
              수업방법(온라인, 오프라인 등)과 본 수강신청시 교과목 수업방법이 상이할
              수 있으니 참고하여 주시기 바랍니다.</font>
            </p>
        </div>
      </div>
    </div>
  </body>
</html>
